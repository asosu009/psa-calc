<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA収支シミュレーター v4</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 10px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 1.4em; }
        .input-group { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.85em; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1.1em; }
        .slider-val { float: right; color: #3498db; font-weight: bold; }
        .result-box { margin-top: 20px; padding: 20px; border-radius: 10px; text-align: center; }
        .profit { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .loss { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .detail-table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.85em; background: white; }
        .detail-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .total-row { font-weight: bold; font-size: 1.1em; background: #fff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-bottom: 10px; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>PSA鑑定 収支シミュレーター</h2>
    
    <div class="input-group">
        <label>合計申込み枚数: <span id="numVal" class="slider-val">20</span></label>
        <input type="range" id="numCards" min="1" max="100" value="20" oninput="calculate()">
        <div id="planBadge" class="badge">バリュー・バルク適用</div>

        <label>PSA10 取得率: <span id="rateVal" class="slider-val">80%</span></label>
        <input type="range" id="psa10Rate" min="0" max="100" value="80" oninput="calculate()">

        <label>1枚あたりの仕入れ値 (円)</label>
        <input type="number" id="buyPrice" value="2000" oninput="calculate()">

        <label>販売予想額 (PSA10) (円)</label>
        <input type="number" id="sellPrice10" value="14000" oninput="calculate()">

        <label>販売予想額 (PSA9以下) (円)</label>
        <input type="number" id="sellPrice9" value="3000" oninput="calculate()">
    </div>

    <div id="resultArea" class="result-box profit">
        <div style="font-size: 0.9em;">合計期待利益 (<span id="totalNumText">20</span>枚合計)</div>
        <div style="font-size: 2.2em; font-weight: bold;"><span id="totalProfitText">0</span>円</div>
        <div style="margin-top: 5px;">1枚あたりの平均利益: <span id="avgProfitText">0</span>円</div>

        <table class="detail-table">
            <tbody>
                <tr><td>1枚あたりの経費合計</td><td id="d-cost" style="text-align:right;">-0円</td></tr>
                <tr><td>10が取れた時の利益</td><td id="d-p10" style="text-align:right; color:#2e7d32;">+0円</td></tr>
                <tr><td>9以下だった時の利益</td><td id="d-p9" style="text-align:right;">+0円</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function calculate() {
    const numCards = Number(document.getElementById('numCards').value);
    const psa10Rate = Number(document.getElementById('psa10Rate').value) / 100;
    const buyPrice = Number(document.getElementById('buyPrice').value);
    const sellPrice10 = Number(document.getElementById('sellPrice10').value);
    const sellPrice9 = Number(document.getElementById('sellPrice9').value);

    document.getElementById('numVal').innerText = numCards;
    document.getElementById('rateVal').innerText = (psa10Rate * 100) + "%";
    document.getElementById('totalNumText').innerText = numCards;

    // 鑑定料 & 諸経費
    let kanteiFee = (numCards >= 20) ? 3980 : 4980;
    let returnShipping = 2000;
    if (numCards >= 2 && numCards <= 4) returnShipping = 2500;
    else if (numCards >= 5 && numCards <= 10) returnShipping = 3500;
    else if (numCards >= 11 && numCards <= 20) returnShipping = 4500;
    else if (numCards > 20) returnShipping = 6500;

    const fixedCostPerCard = (returnShipping + 550) / numCards;
    const commonCost = buyPrice + kanteiFee + fixedCostPerCard + 500; // 500は販売送料

    // 個別利益
    const profit10 = (sellPrice10 * 0.9) - commonCost;
    const profit9 = (sellPrice9 * 0.9) - commonCost;

    // 期待値
    const avgProfit = (profit10 * psa10Rate) + (profit9 * (1 - psa10Rate));
    const totalProfit = avgProfit * numCards;

    // 表示更新
    document.getElementById('totalProfitText').innerText = Math.round(totalProfit).toLocaleString();
    document.getElementById('avgProfitText').innerText = Math.round(avgProfit).toLocaleString();
    document.getElementById('d-cost').innerText = "-" + Math.round(commonCost - buyPrice).toLocaleString() + "円";
    document.getElementById('d-p10').innerText = "+" + Math.round(profit10).toLocaleString() + "円";
    document.getElementById('d-p9').innerText = Math.round(profit9).toLocaleString() + "円";

    const planBadge = document.getElementById('planBadge');
    planBadge.innerText = (numCards >= 20) ? "バリュー・バルク適用" : "バリュー(単品)適用";
    planBadge.style.background = (numCards >= 20) ? "#27ae60" : "#3498db";

    const resultArea = document.getElementById('resultArea');
    resultArea.className = (totalProfit >= 0) ? "result-box profit" : "result-box loss";
}
calculate();
</script>

</body>
</html>
