<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAプロ・シミュレーター v5</title>
    <style>
        body { font-family: sans-serif; max-width: 550px; margin: 20px auto; padding: 10px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; font-size: 1.5em; }
        .input-section { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e8eaed; }
        
        .row { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; gap: 10px; }
        label { font-weight: bold; font-size: 0.85em; color: #5f6368; flex: 1; }
        
        /* 入力エリアの調整 */
        .val-input { width: 100px; padding: 8px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1em; text-align: right; }
        input[type="range"] { flex: 2; margin: 0; cursor: pointer; }

        /* 利益表示エリア */
        .result-container { padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .profit-bg { background: #e6f4ea; border: 1px solid #34a853; color: #137333; }
        .loss-bg { background: #fce8e6; border: 1px solid #d93025; color: #a50e0e; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .summary-item { background: rgba(255,255,255,0.6); padding: 10px; border-radius: 8px; }
        
        .detail-table { width: 100%; border-collapse: collapse; font-size: 0.85em; margin-top: 10px; }
        .detail-table th { background: #f1f3f4; padding: 8px; text-align: left; color: #5f6368; }
        .detail-table td { padding: 8px; border-bottom: 1px solid #e8eaed; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; color: white; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h2>PSA鑑定 収支シミュレーター</h2>
    
    <div class="input-section">
        <div id="planBadge" class="badge" style="background:#1a73e8;">判定中</div>
        
        <label>申込み合計枚数</label>
        <div class="row">
            <input type="range" id="numRange" min="1" max="100" value="20" oninput="sync('numRange', 'numInput')">
            <input type="number" id="numInput" value="20" class="val-input" oninput="sync('numInput', 'numRange')">
        </div>

        <label style="margin-top:20px;">PSA10 取得率 (%)</label>
        <div class="row">
            <input type="range" id="rateRange" min="0" max="100" value="80" oninput="sync('rateRange', 'rateInput')">
            <input type="number" id="rateInput" value="80" class="val-input" oninput="sync('rateInput', 'rateRange')">
        </div>

        <label style="margin-top:20px;">1枚あたりの仕入れ値 (円)</label>
        <input type="number" id="buyPrice" value="2000" style="width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #dadce0;" oninput="calculate()">

        <div style="display:flex; gap:10px; margin-top:15px;">
            <div style="flex:1;">
                <label>予想額 [PSA10]</label>
                <input type="number" id="sell10" value="14000" style="width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #dadce0;" oninput="calculate()">
            </div>
            <div style="flex:1;">
                <label>予想額 [PSA9以下]</label>
                <input type="number" id="sell9" value="4000" style="width:100%; box-sizing:border-box; padding:10px; border-radius:8px; border:1px solid #dadce0;" oninput="calculate()">
            </div>
        </div>
    </div>

    <div id="resultArea" class="result-container profit-bg">
        <div style="font-size: 0.9em;">合計期待利益 (<span id="totalNumDisp">20</span>枚分)</div>
        <div style="font-size: 2.2em; font-weight: bold;"><span id="totalProfit">0</span>円</div>
        
        <div class="summary-grid">
            <div class="summary-item">1枚平均利益<br><b><span id="avgProfit">0</span>円</b></div>
            <div class="summary-item">1枚平均コスト<br><b><span id="avgCost">0</span>円</b></div>
        </div>
    </div>

    <table class="detail-table">
        <thead>
            <tr><th>内訳</th><th>PSA10</th><th>PSA9以下</th></tr>
        </thead>
        <tbody id="detailBody">
            </tbody>
    </table>
</div>

<script>
// 入力欄を連動させる関数
function sync(fromId, toId) {
    const fromEl = document.getElementById(fromId);
    const toEl = document.getElementById(toId);
    toEl.value = fromEl.value;
    calculate();
}

function calculate() {
    const numCards = parseInt(document.getElementById('numInput').value) || 1;
    const rate10 = (parseInt(document.getElementById('rateInput').value) || 0) / 100;
    const buyPrice = parseInt(document.getElementById('buyPrice').value) || 0;
    const sell10 = parseInt(document.getElementById('sell10').value) || 0;
    const sell9 = parseInt(document.getElementById('sell9').value) || 0;

    document.getElementById('totalNumDisp').innerText = numCards;

    // PSAプラン・鑑定料
    let kanteiFee = (numCards >= 20) ? 3980 : 4980;
    const badge = document.getElementById('planBadge');
    badge.innerText = (numCards >= 20) ? "バリュー・バルク適用" : "バリュー(単品)適用";
    badge.style.background = (numCards >= 20) ? "#34a853" : "#1a73e8";

    // 返送料テーブル
    let returnShip = 2000;
    if (numCards >= 2 && numCards <= 4) returnShip = 2500;
    else if (numCards >= 5 && numCards <= 10) returnShip = 3500;
    else if (numCards >= 11 && numCards <= 20) returnShip = 4500;
    else if (numCards > 20) returnShip = 6500;
    
    const fixedCostPerCard = (returnShip + 550) / numCards;

    const cost10 = Math.floor(sell10 * 0.1) + 500;
    const cost9 = Math.floor(sell9 * 0.1) + 500;

    const profit10 = sell10 - (buyPrice + kanteiFee + fixedCostPerCard + cost10);
    const profit9 = sell9 - (buyPrice + kanteiFee + fixedCostPerCard + cost9);

    const avgProfit = (profit10 * rate10) + (profit9 * (1 - rate10));
    const totalProfit = avgProfit * numCards;
    const avgCost = kanteiFee + fixedCostPerCard + buyPrice + ((cost10 * rate10) + (cost9 * (1 - rate10)));

    document.getElementById('totalProfit').innerText = Math.round(totalProfit).toLocaleString();
    document.getElementById('avgProfit').innerText = Math.round(avgProfit).toLocaleString();
    document.getElementById('avgCost').innerText = Math.round(avgCost).toLocaleString();
    
    // テーブル内訳の生成
    document.getElementById('detailBody').innerHTML = `
        <tr><td>鑑定料+諸経費</td><td>-${Math.round(kanteiFee + fixedCostPerCard).toLocaleString()}</td><td>-${Math.round(kanteiFee + fixedCostPerCard).toLocaleString()}</td></tr>
        <tr><td>販売手数料+送料</td><td>-${cost10.toLocaleString()}</td><td>-${cost9.toLocaleString()}</td></tr>
        <tr style="font-weight:bold;"><td>1枚利益</td><td style="color:#1e8e3e;">+${Math.round(profit10).toLocaleString()}</td><td style="color:${profit9<0?'#d93025':'#333'}">${(profit9>=0?'+':'')+Math.round(profit9).toLocaleString()}</td></tr>
    `;

    const resArea = document.getElementById('resultArea');
    resArea.className = (totalProfit >= 0) ? "result-container profit-bg" : "result-container loss-bg";
}

calculate();
</script>

</body>
</html>
